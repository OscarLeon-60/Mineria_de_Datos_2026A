services:

  # ==============================
  # POSTGRESQL
  # ==============================
  postgres:
    image: postgres:15-alpine
    container_name: clima_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./etl/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================
  # ETL SCHEDULER (cada hora)
  # ==============================
  etl:
    build:
      context: .
      dockerfile: Dockerfile.etl
    container_name: clima_etl
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      DB_HOST:     postgres
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT:     ${DB_PORT}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  # ==============================
  # DASHBOARD STREAMLIT
  # ==============================
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: clima_dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST:     postgres
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT:     ${DB_PORT}
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app/dashboard

volumes:
  postgres_data: